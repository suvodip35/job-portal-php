<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PWA Test - FromCampus Job Portal</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#008dff">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            line-height: 1.6;
        }
        .status {
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
        }
        .success { background-color: #d4edda; color: #155724; }
        .error { background-color: #f8d7da; color: #721c24; }
        .info { background-color: #d1ecf1; color: #0c5460; }
        button {
            background: #008dff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover { background: #0066cc; }
        .test-section {
            margin: 20px 0;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <h1>🔧 PWA Test Page - FromCampus Job Portal</h1>
    
    <div class="test-section">
        <h2>Service Worker Status</h2>
        <div id="sw-status" class="status info">Checking...</div>
        <button onclick="testServiceWorker()">Test Service Worker</button>
    </div>
    
    <div class="test-section">
        <h2>Manifest Check</h2>
        <div id="manifest-status" class="status info">Checking...</div>
        <button onclick="testManifest()">Test Manifest</button>
    </div>
    
    <div class="test-section">
        <h2>Cache Status</h2>
        <div id="cache-status" class="status info">Checking...</div>
        <button onclick="testCache()">Test Cache</button>
    </div>
    
    <div class="test-section">
        <h2>Install Prompt</h2>
        <div id="install-status" class="status info">Checking...</div>
        <button onclick="testInstallPrompt()">Test Install Prompt</button>
    </div>
    
    <div class="test-section">
        <h2>Connectivity</h2>
        <div id="connectivity-status" class="status info">Checking...</div>
        <button onclick="testConnectivity()">Test Connectivity</button>
    </div>

    <script>
        // Service Worker Test
        async function testServiceWorker() {
            const statusDiv = document.getElementById('sw-status');
            
            if ('serviceWorker' in navigator) {
                try {
                    const registration = await navigator.serviceWorker.register('/sw.js');
                    statusDiv.className = 'status success';
                    statusDiv.innerHTML = `
                        ✅ Service Worker registered successfully!<br>
                        Scope: ${registration.scope}<br>
                        Active: ${registration.active ? 'Yes' : 'No'}<br>
                        Installing: ${registration.installing ? 'Yes' : 'No'}<br>
                        Waiting: ${registration.waiting ? 'Yes' : 'No'}
                    `;
                } catch (error) {
                    statusDiv.className = 'status error';
                    statusDiv.innerHTML = `❌ Service Worker registration failed: ${error.message}`;
                }
            } else {
                statusDiv.className = 'status error';
                statusDiv.innerHTML = '❌ Service Workers are not supported in this browser';
            }
        }
        
        // Manifest Test
        async function testManifest() {
            const statusDiv = document.getElementById('manifest-status');
            
            try {
                const response = await fetch('/manifest.json');
                if (response.ok) {
                    const manifest = await response.json();
                    statusDiv.className = 'status success';
                    statusDiv.innerHTML = `
                        ✅ Manifest loaded successfully!<br>
                        Name: ${manifest.name}<br>
                        Short Name: ${manifest.short_name}<br>
                        Theme Color: ${manifest.theme_color}<br>
                        Display: ${manifest.display}<br>
                        Icons: ${manifest.icons ? manifest.icons.length : 0} icons defined
                    `;
                } else {
                    throw new Error(`HTTP ${response.status}`);
                }
            } catch (error) {
                statusDiv.className = 'status error';
                statusDiv.innerHTML = `❌ Manifest test failed: ${error.message}`;
            }
        }
        
        // Cache Test
        async function testCache() {
            const statusDiv = document.getElementById('cache-status');
            
            if ('caches' in window) {
                try {
                    const cacheNames = await caches.keys();
                    statusDiv.className = 'status success';
                    statusDiv.innerHTML = `
                        ✅ Cache API available!<br>
                        Caches found: ${cacheNames.length}<br>
                        ${cacheNames.map(name => `• ${name}`).join('<br>')}
                    `;
                } catch (error) {
                    statusDiv.className = 'status error';
                    statusDiv.innerHTML = `❌ Cache test failed: ${error.message}`;
                }
            } else {
                statusDiv.className = 'status error';
                statusDiv.innerHTML = '❌ Cache API is not supported in this browser';
            }
        }
        
        // Install Prompt Test
        function testInstallPrompt() {
            const statusDiv = document.getElementById('install-status');
            
            if ('beforeinstallprompt' in window) {
                statusDiv.className = 'status info';
                statusDiv.innerHTML = `
                    ℹ️ Install prompt events are supported.<br>
                    Try refreshing the page to see if the install prompt appears.<br>
                    Note: Install prompts only show on HTTPS and under certain conditions.
                `;
            } else {
                statusDiv.className = 'status info';
                statusDiv.innerHTML = `
                    ℹ️ Install prompt events not supported in this browser.<br>
                    On iOS, use the Share button → "Add to Home Screen".<br>
                    On Android, look for the install icon in the address bar.
                `;
            }
        }
        
        // Connectivity Test
        function testConnectivity() {
            const statusDiv = document.getElementById('connectivity-status');
            
            statusDiv.className = 'status info';
            statusDiv.innerHTML = `
                ℹ️ Connection Status:<br>
                Online: ${navigator.onLine ? 'Yes' : 'No'}<br>
                Connection Type: ${navigator.connection ? navigator.connection.effectiveType : 'Unknown'}<br>
                HTTPS: ${location.protocol === 'https:' ? 'Yes' : 'No'}<br>
                PWA Standalone: ${window.matchMedia('(display-mode: standalone)').matches ? 'Yes' : 'No'}
            `;
        }
        
        // Run all tests on page load
        window.addEventListener('load', () => {
            testServiceWorker();
            testManifest();
            testCache();
            testInstallPrompt();
            testConnectivity();
        });
        
        // Listen for install prompt
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            const statusDiv = document.getElementById('install-status');
            statusDiv.className = 'status success';
            statusDiv.innerHTML = '✅ Install prompt event received! Install button should appear on main site.';
        });
        
        // Listen for app installed
        window.addEventListener('appinstalled', () => {
            const statusDiv = document.getElementById('install-status');
            statusDiv.className = 'status success';
            statusDiv.innerHTML = '🎉 App successfully installed!';
        });
    </script>
</body>
</html>
